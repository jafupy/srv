name: Rust diagnostics

on:
  push:
    branches: [release/1.0]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/1.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format, test, and record diagnostics
        shell: bash
        run: |
          cargo fmt --all
          set +e
          cargo test --all-features --quiet > diagnostics.txt 2>&1
          status=$?
          set -e
          printf '\nexit_status=%s\n' "$status" >> diagnostics.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.lock diagnostics.txt src Cargo.toml
          if ! git diff --cached --quiet; then
            git commit -m "Apply Rust formatting and update diagnostics"
            git push
          fi
