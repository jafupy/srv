name: Rust diagnostics

on:
  push:
    branches: [release/1.0]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/1.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format, test, lint, and record diagnostics
        shell: bash
        run: |
          cargo fmt --all
          set +e
          printf '## cargo test\n' > diagnostics.txt
          cargo test --all-features --quiet >> diagnostics.txt 2>&1
          test_status=$?
          printf '\n## cargo clippy\n' >> diagnostics.txt
          cargo clippy --all-targets --all-features -- -D warnings >> diagnostics.txt 2>&1
          clippy_status=$?
          set -e
          printf '\ntest_status=%s\nclippy_status=%s\n' "$test_status" "$clippy_status" >> diagnostics.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.lock diagnostics.txt src Cargo.toml
          if ! git diff --cached --quiet; then
            git commit -m "Apply Rust formatting and update diagnostics"
            git push
          fi
