name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --locked
      - run: cargo build --release --locked
      - name: Package Unix binary
        if: runner.os != 'Windows'
        id: package-unix
        shell: bash
        run: |
          artifact="srv-${GITHUB_REF_NAME}-${RUNNER_OS}-${RUNNER_ARCH}.tar.gz"
          tar -czf "$artifact" -C target/release srv
          echo "artifact=$artifact" >> "$GITHUB_OUTPUT"
      - name: Package Windows binary
        if: runner.os == 'Windows'
        id: package-windows
        shell: pwsh
        run: |
          $artifact = "srv-$env:GITHUB_REF_NAME-$env:RUNNER_OS-$env:RUNNER_ARCH.zip"
          Compress-Archive -Path target/release/srv.exe -DestinationPath $artifact
          "artifact=$artifact" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - uses: actions/upload-artifact@v4
        with:
          name: srv-${{ runner.os }}-${{ runner.arch }}
          path: ${{ steps.package-unix.outputs.artifact || steps.package-windows.outputs.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create checksums
        run: sha256sum dist/* > dist/SHA256SUMS
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes
