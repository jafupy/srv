name: Windows diagnostics

on:
  push:
    branches: [release/1.0]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/1.0
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests and record diagnostics
        shell: pwsh
        run: |
          cargo test --all-features --quiet *> windows-diagnostics.txt
          $status = $LASTEXITCODE
          Add-Content windows-diagnostics.txt "`nexit_status=$status"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add windows-diagnostics.txt
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Update Windows diagnostics"
            git push
          }
