name: Finalize metadata

on:
  push:
    branches: [release/1.0]

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/1.0
      - uses: dtolnay/rust-toolchain@stable
      - name: Sync license and lockfile
        shell: bash
        run: |
          curl --fail --silent --show-error --location \
            https://raw.githubusercontent.com/spdx/license-list-data/main/text/AGPL-3.0-only.txt \
            --output LICENSE
          cargo check
          git rm .github/workflows/finalize-metadata.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.lock LICENSE
          git commit -m "Finalize AGPL license and 0.1 metadata"
          git push
